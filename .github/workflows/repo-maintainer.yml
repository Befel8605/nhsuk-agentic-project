name: Repository Maintainer

on:
  workflow_dispatch:

  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  maintain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Scan Repository Structure
        run: |
          echo "Repository audit started"
          find . -type f > repo_inventory.txt

      - name: Create Documentation Report
        run: |
          mkdir -p reports

          {
            echo "# Repository Audit"
            echo ""
            echo "Generated on $(date)"
            echo ""

            echo "## Repository Statistics"
            echo "- Total files: $(find . -type f | wc -l)"
            echo "- Total directories: $(find . -type d | wc -l)"
            echo ""

            echo "## Markdown Files"
            find . -name "*.md" | sed 's/^/- /'

            echo ""
            echo "## Workflow Files"
            find .github/workflows -name "*.yml" -o -name "*.yaml" 2>/dev/null | sed 's/^/- /'

            echo ""
            echo "## Repository Inventory"
            head -50 repo_inventory.txt | sed 's/^/- /'
          } > reports/repository-audit.md

      - name: Commit Changes
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "repo-maintainer-bot"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Repository maintenance update" || exit 0

          git push
